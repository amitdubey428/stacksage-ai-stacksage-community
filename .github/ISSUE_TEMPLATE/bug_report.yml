name: Bug Report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below as completely as possible.

  - type: input
    id: version
    attributes:
      label: StackSage Version
      description: Run `stacksage --version` and paste the output.
      placeholder: "e.g. 0.4.2"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      description: Run `python --version` or `python3 --version`.
      placeholder: "e.g. 3.11.4"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 15, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this? Include the exact command you ran.
      placeholder: |
        1. Run `stacksage scan --profile ...`
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / Error Output
      description: Paste the full error message or unexpected output here.
      render: shell
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant Config (stacksage.yml)
      description: Paste relevant parts of your config if applicable. Remove any sensitive values.
      render: yaml

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful (AWS region, account type, etc.)
